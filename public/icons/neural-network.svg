<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#A78BFA" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Input layer -->
  <circle cx="4" cy="5" r="2"/>
  <circle cx="4" cy="12" r="2"/>
  <circle cx="4" cy="19" r="2"/>
  <!-- Hidden layer -->
  <circle cx="12" cy="7" r="2"/>
  <circle cx="12" cy="17" r="2"/>
  <!-- Output layer -->
  <circle cx="20" cy="12" r="2"/>
  <!-- Connections: input to hidden -->
  <line x1="6" y1="5" x2="10" y2="7"/>
  <line x1="6" y1="12" x2="10" y2="7"/>
  <line x1="6" y1="12" x2="10" y2="17"/>
  <line x1="6" y1="19" x2="10" y2="17"/>
  <line x1="6" y1="5" x2="10" y2="17"/>
  <line x1="6" y1="19" x2="10" y2="7"/>
  <!-- Connections: hidden to output -->
  <line x1="14" y1="7" x2="18" y2="12"/>
  <line x1="14" y1="17" x2="18" y2="12"/>
</svg>
