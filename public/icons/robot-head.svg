<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#60A5FA" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Antenna -->
  <line x1="12" y1="1" x2="12" y2="5"/>
  <circle cx="12" cy="1" r="1" fill="#60A5FA"/>
  <!-- Head -->
  <rect x="4" y="5" width="16" height="14" rx="3" ry="3"/>
  <!-- Eyes -->
  <circle cx="9" cy="12" r="2" fill="#60A5FA"/>
  <circle cx="15" cy="12" r="2" fill="#60A5FA"/>
  <!-- Mouth -->
  <line x1="9" y1="16" x2="15" y2="16"/>
  <!-- Ears -->
  <line x1="4" y1="10" x2="2" y2="10"/>
  <line x1="4" y1="14" x2="2" y2="14"/>
  <line x1="20" y1="10" x2="22" y2="10"/>
  <line x1="20" y1="14" x2="22" y2="14"/>
</svg>
